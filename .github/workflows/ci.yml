name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check generated-file drift
        run: sh scripts/check-generated.sh
      - name: Check dependency license allowlist
        run: sh scripts/check-dependencies.sh
      - name: Check release confidence policy
        run: |
          sh scripts/release-confidence.sh v0.0.4-experimental.1 experimental
          sh scripts/release-confidence.sh v0.9.0-beta.1 preview
          if sh scripts/release-confidence.sh v0.0.4 stable; then exit 1; fi
          if sh scripts/release-confidence.sh v1.0.0 stable; then exit 1; fi
      - name: Build, vet, test, race, and coverage
        run: sh scripts/check.sh
      - name: Install vulnerability scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Scan reachable vulnerabilities
        run: govulncheck ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: error

  cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: accelerator-linux-amd64
          - goos: linux
            goarch: arm64
            output: accelerator-linux-arm64
          - goos: windows
            goarch: amd64
            output: accelerator-windows-amd64.exe
          - goos: darwin
            goarch: arm64
            output: accelerator-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o "dist/${{ matrix.output }}" ./cmd/accelerator
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error
