version: 1

server:
  mysql_listen: 0.0.0.0:3307
  mysql_mode: pooled
  mysql_client_user: accelerator
  mysql_client_password_env: DBA_CLIENT_PASSWORD
  mysql_allow_insecure_network: true
  mysql_tls_mode: disabled
  mysql_tls_cert_file: ""
  mysql_tls_key_file: ""
  admin_listen: 0.0.0.0:9090
  admin_token_env: DBA_ADMIN_TOKEN
  shutdown_timeout: 15s
  data_dir: /var/lib/database-accelerator

upstream:
  enabled: true
  host: host.docker.internal
  port: 3306
  user: accelerator
  password_env: DBA_UPSTREAM_PASSWORD
  allow_empty_password: false
  database: app
  tls_mode: preferred
  tls_ca_file: ""
  tls_server_name: ""
  connect_timeout: 5s
  read_timeout: 30s
  write_timeout: 30s
  health_timeout: 5s

limits:
  max_logical_connections: 10000
  max_upstream_connections: 200
  max_queued_requests: 5000
  max_queued_bytes: 67108864

logging:
  level: info
